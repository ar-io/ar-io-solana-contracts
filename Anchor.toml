# Program IDs below are intentional placeholders — they never match any real
# keypair and WILL fail deploy if used as-is. Use `./build-sbf.sh --sync`
# (localnet) or `anchor keys sync` + commit (devnet/mainnet) to align
# declare_id!() with target/deploy/<crate>-keypair.json before deploying.
# See CLAUDE.md → "Contracts (Rust/Anchor)" for the full flow.

[toolchain]
anchor_version = "0.31.1"
solana_version = "2.1.0"

[features]
resolution = true
skip-lint = false

[programs.localnet]
ario_core = "ARioCoreProgramXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
