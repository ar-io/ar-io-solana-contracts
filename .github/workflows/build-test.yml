name: Lint & Test

# Fast PR feedback: fmt, clippy, and native tests in one job (one cache
# restore, one rustc link of the workspace).  mold speeds up linking
# large test binaries vs. the default GNU ld.
#
# No anchor build, no BPF dispatch, no Docker image.
#
# Full BPF build + test happens in the release pipelines
# (release-devnet.yml, release-mainnet.yml), which call this workflow
# first and then run anchor build + BPF tests in their own jobs.
concurrency:
  group: >-
    ${{ github.event_name == 'workflow_call' &&
       format('lint-test-call-{0}', github.sha) ||
       format('lint-test-pr-{0}',
         github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
  workflow_call:

env:
  # Host toolchain: used for fmt, clippy, cargo test.
  # Must match the channel in rust-toolchain.toml so local and CI
  # lints stay identical.
  RUST_TOOLCHAIN_HOST: 1.90.0
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  lint-and-test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_HOST }}
          components: rustfmt, clippy

      - name: Install mold + clang (faster links)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold clang
        env:
          DEBIAN_FRONTEND: noninteractive

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ar-io-contracts-lint-test

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --no-deps --locked -- -D warnings

      - name: Test (native dispatch)
        run: cargo test --workspace --no-fail-fast
