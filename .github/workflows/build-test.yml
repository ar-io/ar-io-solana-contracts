name: Build & Test

# Default CI: runs on every push to feature branches and on every PR
# targeting develop or main. The release pipelines (release-devnet,
# release-mainnet) call this workflow via `workflow_call` so we don't
# duplicate the build steps.
#
# Concurrency: cancel superseded runs, but —
# - PR + push-to-head used to double-fire (different github.ref groups).
#   We key PRs by number so synchronize/push reuse one group.
# - Reusable callers must NOT share a single refs/heads/develop group or
#   concurrent merges cancel each other's in-flight build-test runs.
concurrency:
  group: >-
    ${{ github.event_name == 'workflow_call' &&
       format('build-test-call-{0}', github.sha) ||
       github.event_name == 'pull_request' &&
       format('build-test-pr-{0}', github.event.pull_request.number) ||
       format('build-test-{0}', github.ref) }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
      - '!main'
      - '!develop'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
  workflow_call:
    outputs:
      sha:
        description: "Commit SHA used for this build"
        value: ${{ jobs.build.outputs.sha }}

env:
  ANCHOR_VERSION: 0.31.1
  SOLANA_VERSION: v2.1.0
  # BPF toolchain: cargo-build-sbf bundles Cargo/rustc 1.79; the dep
  # graph (Cargo.lock) must stay parseable by that Cargo. See the
  # time-macros / time pin in Cargo.lock.
  RUST_TOOLCHAIN: 1.79.0
  # Host toolchain: used for fmt, clippy, avm install, cargo test.
  # Needs >= 1.80 (LazyLock, required by avm 0.31.1) and >= 1.85
  # (edition2024 manifest parsing) to resolve the full dep graph.
  RUST_TOOLCHAIN_HOST: 1.86.0
  CARGO_TERM_COLOR: always

jobs:
  fmt-clippy:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_HOST }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ar-io-contracts-host

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (host target)
        # --locked: honour Cargo.lock pins (time-macros < 0.2.27, etc.)
        # so the dep graph stays compatible with cargo-build-sbf's Cargo 1.79.
        # Allowed lint categories live in [workspace.lints] (Cargo.toml).
        run: cargo clippy --workspace --all-targets --no-deps --locked -- -D warnings

  build:
    name: anchor build + cargo test
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchains
        run: |
          # Host toolchain (avm install, cargo test). Must be >= 1.80
          # for avm's LazyLock usage.
          rustup toolchain install ${{ env.RUST_TOOLCHAIN_HOST }}
          rustup default ${{ env.RUST_TOOLCHAIN_HOST }}
          # BPF toolchain: cargo-build-sbf's platform-tools ships its
          # own 1.79 compiler; this install just ensures the host
          # resolver can fall back if needed.
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ar-io-contracts-bpf

      - name: Install Solana CLI ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor ${{ env.ANCHOR_VERSION }}
        run: |
          # avm 0.31.1 uses std::sync::LazyLock (stable in Rust 1.80).
          # Build it with the host toolchain (>= 1.86), then avm manages
          # the anchor CLI binary separately.
          cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Versions
        run: |
          rustc --version
          cargo --version
          solana --version
          anchor --version

      # Linking the five programs + their integration test binaries in
      # debug mode can exceed the runner's 7 GB RAM (LLD OOMs / bus
      # errors on ario-ant-escrow). Provision extra swap as a safety net.
      # Use a unique path — /swapfile is already in use on some runners.
      - name: Provision swap (linker memory)
        run: |
          sudo fallocate -l 10G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

      # `anchor build` produces both target/idl/*.json and target/deploy/*.so.
      # Required before `cargo test` (programs load the .so via SPT) and
      # before the IDL ABI / event-snapshot checks.
      - name: anchor build
        run: anchor build

      - name: declare_id drift guard
        run: bash build-sbf.sh --check-only

      - name: Stage Metaplex Core fixture for ario-arns / ario-ant-escrow
        run: |
          cp programs/ario-arns/tests/fixtures/mpl_core.so target/deploy/

      - name: cargo test (BPF dispatch)
        env:
          BPF_OUT_DIR: ${{ github.workspace }}/target/deploy
        run: cargo test --workspace --no-fail-fast

      - name: IDL event ABI stability check
        run: node scripts/idl-event-snapshot.mjs

      - name: Upload build artifacts (idl + so)
        uses: actions/upload-artifact@v4
        with:
          name: contracts-build-${{ steps.commit.outputs.sha }}
          path: |
            target/idl/*.json
            target/deploy/*.so
          if-no-files-found: error
          retention-days: 14

  fuzz-smoke:
    # Quick fuzz smoke (~30s budget per target) on the escrow signature
    # verifiers — full overnight fuzzing runs out-of-band, this is just
    # a regression net for breakage on CPI / parsing paths.
    name: fuzz smoke (ario-ant-escrow)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ar-io-contracts-fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Smoke run verify_personal_sign (30s)
        working-directory: programs/ario-ant-escrow/fuzz
        run: cargo +nightly fuzz run verify_personal_sign -- -max_total_time=30
      - name: Smoke run verify_rsa_pss (30s)
        working-directory: programs/ario-ant-escrow/fuzz
        run: cargo +nightly fuzz run verify_rsa_pss -- -max_total_time=30
