name: Lint & Test

# Fast PR feedback: fmt, clippy, and native-dispatch tests.
# No anchor build, no BPF dispatch, no Docker image — just Rust on a
# bare runner with cached deps.  Typically completes in 3-5 minutes.
#
# Full BPF build + test happens in the release pipelines
# (release-devnet.yml, release-mainnet.yml) which call this workflow
# first and then run anchor build + BPF tests in their own jobs.
concurrency:
  group: >-
    ${{ github.event_name == 'workflow_call' &&
       format('lint-test-call-{0}', github.sha) ||
       format('lint-test-pr-{0}',
         github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
  workflow_call:

env:
  # Host toolchain: used for fmt, clippy, cargo test.
  # Must match the channel in rust-toolchain.toml so local and CI
  # lints stay identical.
  RUST_TOOLCHAIN_HOST: 1.90.0
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  fmt-clippy:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_HOST }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ar-io-contracts-host

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (host target)
        run: cargo clippy --workspace --all-targets --no-deps --locked -- -D warnings

  test:
    name: native tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_HOST }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ar-io-contracts-host

      - name: cargo test — native dispatch (all programs)
        run: cargo test --workspace --no-fail-fast
