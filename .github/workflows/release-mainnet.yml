name: Release (mainnet)

# Triggers on every merge to main. Builds, runs the full test suite,
# stages BPF write-buffers on mainnet, transfers buffer authority to the
# Squads multisig, and publishes a release bundle. The actual program
# upgrade is executed by the multisig signers from the Squads UI — CI
# never holds the upgrade key.
#
# Required GitHub environment: "mainnet"
#   - Required reviewers: at minimum two AR.IO core engineers (matches
#     the merge protection on main).
#   - Wait timer (recommended): 30 minutes between approval and run, so a
#     maintainer can revoke if a problem surfaces post-merge.
#   Secrets:
#     MAINNET_BUFFER_AUTHORITY_KEYPAIR    Hot wallet that pays the
#                                         write-buffer rent and signs the
#                                         set-buffer-authority transfer
#                                         to the multisig. (Transient
#                                         role; lamports reclaimed by
#                                         `solana program close` after
#                                         the upgrade lands.)
#
#                                         The secret is passed to the
#                                         stage step via env only — see
#                                         BUFFER_AUTHORITY_KEY_JSON
#                                         below. mainnet-prepare-upgrade.sh
#                                         feeds it to solana via process
#                                         substitution; the bytes never
#                                         hit the runner's filesystem.
#   Vars:
#     MAINNET_RPC_URL                     default: https://api.mainnet-beta.solana.com
#     SQUADS_MULTISIG_PUBKEY              the multisig PDA that holds
#                                         upgrade authority on each
#                                         program.

# Serialize mainnet releases; do not cancel in-progress buffer staging /
# uploads — partial runs can leave orphaned buffers or half-published
# artifacts. Rapid pushes queue behind the active run instead.
concurrency:
  group: release-mainnet-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_buffer_stage:
        description: "Build + release artifacts only; skip on-chain buffer staging"
        type: boolean
        default: false
      programs:
        description: "Subset of programs to stage buffers for (space-separated). Empty = all."
        type: string
        default: ""

env:
  ANCHOR_VERSION: 0.31.1
  SOLANA_VERSION: v2.1.0
  RUST_TOOLCHAIN: 1.79.0
  RUST_TOOLCHAIN_HOST: 1.90.0
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    uses: ./.github/workflows/build-test.yml
    secrets: inherit

  stage-mainnet-upgrade:
    name: Stage mainnet upgrade buffers
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: mainnet           # Required reviewers gate this job.
      url: https://app.squads.so
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchains
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN_HOST }}
          rustup default ${{ env.RUST_TOOLCHAIN_HOST }}
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ar-io-contracts-bpf-mainnet

      - name: Install Solana CLI ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor ${{ env.ANCHOR_VERSION }}
        run: |
          # avm 0.31.1 requires LazyLock (Rust >= 1.80). Build with the
          # host toolchain; see build-test.yml for full rationale.
          cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Validate program-ids/mainnet.json is populated
        run: |
          if ! jq -e '.programs.ario_core | length > 0' program-ids/mainnet.json; then
            echo "::error::program-ids/mainnet.json is missing program IDs."
            echo "Populate it before merging to main."
            exit 1
          fi

      - name: Refuse to deploy with test attestor pubkey
        run: bash scripts/check-attestor-pubkey.sh --strict

      - name: Build (mainnet feature flags)
        run: |
          # Sync declare_id!() into source from the committed mainnet
          # program-ids manifest. This is intentionally separate from the
          # devnet `anchor keys sync` flow because mainnet program IDs
          # are NOT generated from local keypairs in CI — they came from
          # the original mainnet deploy and are persisted in source via
          # program-ids/mainnet.json.
          BUILD_NETWORK=mainnet bash build-sbf.sh --skip-check
          anchor build

      - name: declare_id integrity check vs program-ids/mainnet.json
        run: |
          declare_ids=$(grep -h 'declare_id!' programs/*/src/lib.rs | sed -E 's/.*"([^"]+)".*/\1/' | sort)
          # `select(. != null)` skips program-ids entries that are null
          # (e.g. ario_ant_escrow before its first mainnet deploy). The
          # check is "every program ID listed in the manifest must be
          # declared in source" — extra source declarations for programs
          # not yet on mainnet are fine.
          manifest_ids=$(jq -r '.programs[] | select(. != null)' program-ids/mainnet.json | sort)
          missing=$(comm -23 <(echo "$manifest_ids") <(echo "$declare_ids"))
          if [[ -n "$missing" ]]; then
            echo "::error::declare_id!() values missing from source for these manifest IDs:"
            echo "$missing"
            exit 1
          fi

      - name: Stage buffers (write-buffer + set-buffer-authority -> Squads)
        if: ${{ !inputs.skip_buffer_stage }}
        env:
          # Buffer authority lives in env only — mainnet-prepare-upgrade.sh
          # feeds it to solana via process substitution, never writing
          # to disk. The hot wallet is transient (lamports reclaimed
          # post-upgrade) but it shouldn't end up in any uploaded artifact.
          BUFFER_AUTHORITY_KEY_JSON: ${{ secrets.MAINNET_BUFFER_AUTHORITY_KEYPAIR }}
          SQUADS_MULTISIG_PUBKEY: ${{ vars.SQUADS_MULTISIG_PUBKEY }}
          PROGRAM_IDS_PATH: program-ids/mainnet.json
          RPC_URL: ${{ vars.MAINNET_RPC_URL || 'https://api.mainnet-beta.solana.com' }}
          PROGRAMS: ${{ inputs.programs }}
          SKIP_BUILD: "1"   # already built above
        run: bash scripts/mainnet-prepare-upgrade.sh

      - name: Compute version tag
        id: ver
        run: |
          short_sha=$(git rev-parse --short HEAD)
          version="mainnet-$(date -u +%Y%m%d-%H%M%S)-${short_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Package release bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          CLUSTER: mainnet
        run: bash scripts/package-release.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ar-io-solana-contracts-${{ steps.ver.outputs.version }}
          path: release/ar-io-solana-contracts-${{ steps.ver.outputs.version }}.tar.gz
          retention-days: 365

      - name: Upload buffer manifest (multisig signer hand-off)
        if: ${{ !inputs.skip_buffer_stage }}
        uses: actions/upload-artifact@v4
        with:
          name: buffer-manifest-${{ steps.ver.outputs.version }}
          path: release/upgrade-*/buffer-manifest.json
          retention-days: 365

      - name: Create GitHub release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          notes="Mainnet release $VERSION

          **Cluster:** mainnet-beta
          **Commit:** ${{ github.sha }}

          ## Status
          The upgrade buffers have been staged and their authority transferred
          to the Squads multisig (\`${{ vars.SQUADS_MULTISIG_PUBKEY }}\`).
          Multisig signers must vote and execute the upgrade transactions
          before the new bytecode is live. See the \`buffer-manifest.json\`
          attached to the workflow run for buffer pubkeys + SHA-256 hashes.

          ## Bundle contents
          - \`idl/\` — Anchor 0.31 IDLs
          - \`so/\` — compiled BPF binaries
          - \`program-ids.json\` — program ID manifest
          - \`SHA256SUMS\` — checksums (must match buffer hashes)

          ## Verification
          \`\`\`
          shasum -a 256 ar-io-solana-contracts-${VERSION}/so/*.so
          \`\`\`
          should match the \`buffer_sha256\` field in the buffer manifest."

          gh release create "$VERSION" \
            --title "Mainnet release $VERSION" \
            --notes "$notes" \
            --target main \
            --draft \
            "release/ar-io-solana-contracts-${VERSION}.tar.gz"
