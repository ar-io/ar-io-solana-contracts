name: Release (devnet)

# Triggers on every merge to develop. Runs the full build/test suite,
# upgrades the live devnet contracts (UPGRADES ONLY — never first deploys),
# and publishes a versioned release bundle (IDLs + .so + program-ids
# manifest) so downstream clients can consume the deployed devnet IDs
# directly or load the .so files into their own Surfpool / test-validator.
#
# Upgrade-only model
# ------------------
# CI holds exactly ONE secret: the upgrade authority keypair
# (DEVNET_AUTHORITY_KEY_JSON). It does not hold program keypairs and cannot
# mint new program IDs. Program IDs are read from the committed
# program-ids/devnet.json manifest; scripts/devnet-deploy.sh syncs source
# declare_id!() values from the manifest at build time and then runs
# `solana program deploy --program-id <PUBKEY>` against each existing
# program, signed by the authority.
#
# The authority keypair is passed to the deploy step via the
# AUTHORITY_KEY_JSON env var (the raw JSON contents of the keypair, not
# a path). devnet-deploy.sh hands it to solana through bash process
# substitution (`solana --keypair <(printf %s "$AUTHORITY_KEY_JSON")`),
# so the bytes only ever live in process memory and an anonymous pipe —
# they are never written to the runner's filesystem and won't end up in
# any uploaded artifact.
#
# First deploys (today: only ario_ant_escrow) are an offline operator
# action — done from a maintainer laptop with the program keypair, then
# the resulting ID is committed to program-ids/devnet.json and CI picks it
# up automatically on the next run. See scripts/devnet-deploy.sh for the
# `set-upgrade-authority` step that hands custody to the CI authority key.
#
# Required GitHub environment: "devnet"
#   Secrets:
#     DEVNET_AUTHORITY_KEY_JSON   JSON keypair (Solana CLI format) with
#                                 upgrade authority over each deployed
#                                 devnet program. Compromise: rotate via
#                                 `solana program set-upgrade-authority`
#                                 from a machine that still has the
#                                 current key BEFORE updating this secret
#                                 (the on-chain authority is the source
#                                 of truth — losing it is recoverable
#                                 only if you race the attacker).
#   Vars:
#     DEVNET_RPC_URL              default: https://api.devnet.solana.com

concurrency:
  group: release-devnet
  cancel-in-progress: false   # don't kill a deploy mid-flight

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Build + release artifacts only; skip on-chain upgrade"
        type: boolean
        default: false

env:
  ANCHOR_VERSION: 0.31.1
  SOLANA_VERSION: v2.1.0
  RUST_TOOLCHAIN: 1.79.0
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    uses: ./.github/workflows/build-test.yml
    secrets: inherit

  deploy-devnet:
    name: Deploy to devnet
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: devnet
      url: https://explorer.solana.com/?cluster=devnet
    permissions:
      contents: write   # create release + tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ar-io-contracts-bpf

      - name: Install Solana CLI ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor ${{ env.ANCHOR_VERSION }}
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Deploy
        if: ${{ !inputs.skip_deploy }}
        env:
          # Authority keypair lives in env only — devnet-deploy.sh feeds it
          # to solana via process substitution, never writing to disk.
          AUTHORITY_KEY_JSON: ${{ secrets.DEVNET_AUTHORITY_KEY_JSON }}
          DEPLOY_CLUSTER: ${{ vars.DEVNET_RPC_URL || 'https://api.devnet.solana.com' }}
          BUILD_NETWORK: devnet
          PROGRAM_IDS_PATH: program-ids/devnet.json
          SKIP_AIRDROP: "1"   # CI authority is pre-funded; drips would be racy
        run: bash scripts/devnet-deploy.sh

      - name: Build (skip-deploy path)
        if: ${{ inputs.skip_deploy }}
        env:
          PROGRAM_IDS_PATH: program-ids/devnet.json
        run: |
          # Sync declare_id!() from the committed manifest (CI has no
          # program keypairs), build .so + IDLs.
          BUILD_NETWORK=devnet bash build-sbf.sh --sync-from-manifest
          # NOTE: anchor build re-runs cargo build-sbf and re-emits IDLs
          # from source. By the time it runs, --sync-from-manifest's EXIT
          # trap has restored source declare_id!() to placeholders, so the
          # IDL.metadata.address fields will reflect those placeholders.
          # Downstream consumers should derive addresses from
          # program-ids.json in the bundle, not from IDL.metadata.address.
          anchor build

      - name: Compute version tag
        id: ver
        run: |
          short_sha=$(git rev-parse --short HEAD)
          version="devnet-$(date -u +%Y%m%d-%H%M%S)-${short_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Package release bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          CLUSTER: devnet
        run: bash scripts/package-release.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ar-io-solana-contracts-${{ steps.ver.outputs.version }}
          path: release/ar-io-solana-contracts-${{ steps.ver.outputs.version }}.tar.gz
          retention-days: 90

      - name: Commit & push refreshed program-ids/devnet.json
        if: ${{ !inputs.skip_deploy }}
        run: |
          if git diff --quiet program-ids/devnet.json; then
            echo "program-ids/devnet.json unchanged"
            exit 0
          fi
          git config user.name "ar-io-ci[bot]"
          git config user.email "ci@ar.io"
          git add program-ids/devnet.json
          git commit -m "chore(devnet): publish program-ids @ ${{ steps.ver.outputs.version }}"
          git push origin HEAD:develop

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "Devnet release $VERSION" \
            --notes "Automated devnet release.

            **Cluster:** devnet
            **Commit:** ${{ github.sha }}

            ## Bundle contents
            - \`idl/\` — Anchor 0.31 IDLs (one per program with a non-null
              entry in program-ids/devnet.json)
            - \`so/\` — compiled BPF binaries (same set)
            - \`program-ids.json\` — program ID manifest
            - \`VERSION\` — version, cluster, git SHA, build timestamp,
              toolchain versions
            - \`SHA256SUMS\` — checksums

            Program keypairs are not included. CI does not hold them and
            cannot mint new program IDs — the only secret in CI is the
            upgrade authority. Program keypairs live in the original
            deployer's offline custody and are only needed for first
            deploys (a manual operator action).

            See repository [README](https://github.com/${{ github.repository }}/blob/main/README.md) for integration instructions." \
            --target develop \
            --prerelease \
            "release/ar-io-solana-contracts-${VERSION}.tar.gz"
