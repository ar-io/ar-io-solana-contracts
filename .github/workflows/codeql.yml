name: CodeQL

# Static analysis on Rust + JS workflow / scripts. Runs on push to
# develop / main and on a weekly schedule so dormant branches still get
# coverage. Findings surface in the GitHub Security tab.
#
# Cancel older CodeQL matrix legs when a newer commit lands on the same
# logical branch / PR so pushes don't pile up parallel analyses.
concurrency:
  group: >-
    ${{ github.event_name == 'pull_request' &&
       format('codeql-pr-{0}', github.event.pull_request.number) ||
       github.event_name == 'schedule' &&
       format('codeql-schedule-{0}', github.ref) ||
       format('codeql-{0}', github.ref) }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '23 11 * * 1'   # Mondays 11:23 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
