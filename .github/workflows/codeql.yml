name: CodeQL

# Static analysis on Rust + JS workflow / scripts. Findings surface in
# the GitHub Security tab.
#
# TEMPORARILY DISABLED (2026-05): automatic triggers are off while CodeQL
# integration is sorted out. Re-enable by restoring push / pull_request /
# schedule under `on:` below (see git history). Manual runs still work:
#   Actions → CodeQL → Run workflow
#
# When re-enabled, keep concurrency so pushes do not pile up analyses:
#   concurrency:
#     group: >-
#       ${{ github.event_name == 'pull_request' &&
#          format('codeql-pr-{0}', github.event.pull_request.number) ||
#          github.event_name == 'schedule' &&
#          format('codeql-schedule-{0}', github.ref) ||
#          format('codeql-{0}', github.ref) }}
#     cancel-in-progress: true

on:
  workflow_dispatch:   # only — no push / PR / schedule until re-enabled

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
